name: Release

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Rebuild even if x/piko/x-shim versions are unchanged"
        type: boolean
        default: false

concurrency:
  group: twitter-apk-release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Restore signing keystore
        env:
          APK_KEYSTORE_BASE64: ${{ secrets.APK_KEYSTORE_BASE64 }}
          APK_KEYSTORE_PASSWORD: ${{ secrets.APK_KEYSTORE_PASSWORD }}
          APK_KEY_ALIAS: ${{ secrets.APK_KEY_ALIAS }}
          APK_KEY_PASSWORD: ${{ secrets.APK_KEY_PASSWORD }}
        run: |
          : "${APK_KEYSTORE_BASE64:?Missing APK_KEYSTORE_BASE64 secret}"
          : "${APK_KEYSTORE_PASSWORD:?Missing APK_KEYSTORE_PASSWORD secret}"
          : "${APK_KEY_ALIAS:?Missing APK_KEY_ALIAS secret}"
          : "${APK_KEY_PASSWORD:?Missing APK_KEY_PASSWORD secret}"
          mkdir -p signing
          printf '%s' "$APK_KEYSTORE_BASE64" | base64 --decode > signing/release.keystore

      - name: Build and publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_THREAD_ID: ${{ secrets.TG_THREAD_ID }}
          FORCE_BUILD: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force == true && '1' || '' }}
          APK_KEYSTORE_PATH: signing/release.keystore
          APK_KEYSTORE_PASSWORD: ${{ secrets.APK_KEYSTORE_PASSWORD }}
          APK_KEY_ALIAS: ${{ secrets.APK_KEY_ALIAS }}
          APK_KEY_PASSWORD: ${{ secrets.APK_KEY_PASSWORD }}
        run: |
          mkdir -p bins
          uv run main.py
